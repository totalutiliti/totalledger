name: CD

on:
  push:
    branches: [main]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  AZURE_CONTAINER_REGISTRY: ${{ vars.AZURE_CONTAINER_REGISTRY }}
  API_IMAGE: sercofi-api
  WEB_IMAGE: sercofi-web

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      api_image_tag: ${{ steps.meta-api.outputs.tags }}
      web_image_tag: ${{ steps.meta-web.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.AZURE_CONTAINER_REGISTRY }}

      - name: Set image tag
        id: tag
        run: echo "TAG=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build & Push API
        id: meta-api
        run: |
          TAG=${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.API_IMAGE }}:${{ steps.tag.outputs.TAG }}
          docker build -f apps/api/Dockerfile -t $TAG .
          docker push $TAG
          echo "tags=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build & Push Web
        id: meta-web
        run: |
          TAG=${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.WEB_IMAGE }}:${{ steps.tag.outputs.TAG }}
          docker build -f apps/web/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL=${{ vars.API_URL }} \
            -t $TAG .
          docker push $TAG
          echo "tags=$TAG" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy API
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: ${{ vars.API_CONTAINER_APP_NAME }}
          resourceGroup: ${{ vars.AZURE_RESOURCE_GROUP }}
          imageToDeploy: ${{ needs.build-and-push.outputs.api_image_tag }}

      - name: Deploy Web
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: ${{ vars.WEB_CONTAINER_APP_NAME }}
          resourceGroup: ${{ vars.AZURE_RESOURCE_GROUP }}
          imageToDeploy: ${{ needs.build-and-push.outputs.web_image_tag }}

      - name: Run Migrations
        run: |
          az containerapp exec \
            --name ${{ vars.API_CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --command "npx prisma migrate deploy"
